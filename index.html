<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="form-container">
    <h2>Contact Us</h2>
    <form id="contactForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" />
        <span class="error" id="nameError">Name is required.</span>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <span class="error" id="emailError">Enter a valid email address.</span>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="Enter your phone number" />
        <span class="error" id="phoneError">Enter a valid 10-digit phone number.</span>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="4" placeholder="Write your message..."></textarea>
        <span class="error" id="messageError">Message cannot be empty.</span>
      </div>
      <button type="submit">Submit</button>
      <p id="successMsg" class="success-msg">✅ Form submitted successfully!</p>
    </form>
  </div>
  <script src="validation.js"></script>
</body>
</html>
